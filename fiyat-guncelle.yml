name: Fiyatlari Guncelle

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  guncelle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: python doviz.py

      - run: python market.py

      - run: python elektronik.py

      # Gorseller simdilik devre disi, en sonda manuel halledilecek
      # - run: python resimler.py
      #   env:
      #     PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add otomatik_fiyatlar.json otomatik_market.json otomatik_elektronik.json
          git diff --staged --quiet || git commit -m "Fiyatlar guncellendi"
          git push
