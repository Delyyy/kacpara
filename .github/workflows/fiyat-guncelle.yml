name: Fiyatlari Otomatik Guncelle

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  guncelle:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gerekli kutuphaneleri yukle
        run: pip install requests

      - name: Fiyat cekici scripti calistir
        run: python doviz.py

      - name: Yeni fiyatlari repoya yaz
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add otomatik_fiyatlar.json
          git diff --staged --quiet || git commit -m "Otomatik fiyat guncelleme"
          git push
